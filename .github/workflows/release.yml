name: Release
'on':
  push:
    tags: ['v*']
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: '26.5.0'
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - name: Validate tag matches package version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm test
      - run: pnpm run sync:skills
      - name: Inject PostHog API key
        env:
          OMO_KIMI_POSTHOG_API_KEY: ${{ secrets.OMO_KIMI_POSTHOG_API_KEY }}
        run: |
          if [ -z "$OMO_KIMI_POSTHOG_API_KEY" ]; then
            echo "::warning::OMO_KIMI_POSTHOG_API_KEY secret is not set. Telemetry will be skipped in the release build."
          else
            sed -i "s/phc_placeholder_replace_in_build/$OMO_KIMI_POSTHOG_API_KEY/g" src/components/telemetry/posthog.ts
          fi
      - run: pnpm run build
      - run: zip -r lazykimicode.zip plugin scripts bin dist package.json
      - uses: softprops/action-gh-release@v3
        with:
          files: lazykimicode.zip
      - run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
